name: build-portable-binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: fowl-linux-x86_64-musl
            binary_suffix: ""
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: fowl-macos-x86_64
            binary_suffix: ""
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: fowl-macos-aarch64
            binary_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: fowl-windows-x86_64
            binary_suffix: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl linker
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install --yes musl-tools

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage Unix artifacts
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/fowl${{ matrix.binary_suffix }} dist/
          cp target/${{ matrix.target }}/release/fowld${{ matrix.binary_suffix }} dist/

      - name: Stage Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/fowl${{ matrix.binary_suffix }}" "dist/"
          Copy-Item "target/${{ matrix.target }}/release/fowld${{ matrix.binary_suffix }}" "dist/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
